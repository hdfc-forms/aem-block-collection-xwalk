<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nav Button Fixture</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/blocks/button/button.css">
</head>
<body>
  <main>
    <div class="section">
      <!-- All three variants share ONE model (blocks/button/_button.json),
           so every instance renders the same 5 positional field divs
           (link, linkText, linkTitle, linkType, apiSuccessPage) regardless
           of variant - the variant class (page/section/api) is what
           button.js reads to decide behavior, mirroring .teaser.hero /
           .teaser.compact. -->
      <div class="button page" data-block-name="button" id="btn-page">
        <div><div>/blog-demo</div></div>
        <div><div>Go to Blog</div></div>
        <div><div>Go to Blog Tooltip</div></div>
        <div><div>primary</div></div>
        <div><div></div></div>
      </div>

      <div class="button section" data-block-name="button" id="btn-section">
        <div><div>features</div></div>
        <div><div>Jump to Features</div></div>
        <div><div></div></div>
        <div><div></div></div>
        <div><div></div></div>
      </div>

      <!-- no apiSuccessPage configured: tests the API-call + logging behavior
           in isolation, without triggering the post-success redirect (that
           one-line window.location.href assignment is simple enough to be
           covered by code review rather than fighting real-navigation timing
           in a headless test) -->
      <div class="button api" data-block-name="button" id="btn-api">
        <div><div>/api/mock-success</div></div>
        <div><div>Call API</div></div>
        <div><div></div></div>
        <div><div></div></div>
        <div><div></div></div>
      </div>

      <div id="features">Features section target</div>
    </div>
  </main>

  <script type="module">
    import decorate from '/blocks/button/button.js';

    // Test-only: capture-phase listener that prevents real <a> navigation, so
    // tests can exercise button.js's own click handling (analytics) without
    // racing against a real page unload destroying the JS context mid-
    // assertion. Does not call stopPropagation(), so button.js's own
    // bubble-phase click handler still runs normally afterward.
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (a) e.preventDefault();
    }, true);

    document.querySelectorAll('.button.page, .button.section, .button.api').forEach((block) => decorate(block));
    document.body.classList.add('appear'); // styles.css hides body until scripts.js normally adds this

    // Import the REAL delayed.js (not just analytics.js directly) so the
    // "fires once" test genuinely proves this block's stopPropagation()
    // prevents double-counting against production's sitewide delegated
    // .button click listener, not just against a fixture-only subscriber.
    // window.__delayedReady lets tests wait for its subscribers to be
    // registered before clicking, since the import itself is async.
    import('/scripts/delayed.js').then(() => { window.__delayedReady = true; });
  </script>
</body>
</html>
